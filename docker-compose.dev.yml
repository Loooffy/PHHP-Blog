# 開發環境 Docker Compose
# 使用方式: docker compose -f docker-compose.dev.yml --env-file .env.dev up -d

services:
  # PostgreSQL 服務
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - postgres-shared-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Rails Backend API 服務
  backend:
    build:
      context: ./backend-activeAdmin
      dockerfile: Dockerfile.dev
    container_name: pp_hh_blog_backend_dev
    environment:
      - RAILS_ENV=${ENVIRONMENT}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - RAILS_MAX_THREADS=5
      - PORT=${RAILS_PORT}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_BUCKET=${R2_BUCKET}
      - R2_ASSETS_DOMAIN=${R2_ASSETS_DOMAIN}
    ports:
      - "${EXTERNAL_BACKEND_PORT}:${RAILS_PORT}"
    volumes:
      - ./backend-activeAdmin:/rails
      - backend_bundle_dev:/usr/local/bundle
      - backend_node_modules_dev:/rails/node_modules
    command: >
      sh -c "
       echo 'Waiting for PostgreSQL to be ready...' &&
       until pg_isready -h ${DATABASE_HOST} -U ${DATABASE_USERNAME}; do
         sleep 2;
       done &&
       echo 'PostgreSQL is ready, starting Rails...' &&
       rm -f /rails/tmp/pids/server.pid &&
       bundle install &&
       bin/rails db:create db:migrate db:seed &&
       bin/rails server -b 0.0.0.0 -p ${RAILS_PORT}
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
      - postgres-shared-net

  # Next.js Frontend 服務
  frontend:
    user: root
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile.dev
    container_name: pp_hh_blog_frontend_dev
    environment:
      - NODE_ENV=${ENVIRONMENT}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - API_INTERNAL_URL=${API_INTERNAL_URL}
    ports:
      - "${EXTERNAL_FRONTEND_PORT}:${NEXT_JS_PORT}"
    volumes:
      - ./frontend-nextjs:/app
      - frontend_node_modules_dev:/app/node_modules
      - frontend_next_dev:/app/.next
    depends_on:
      - backend
    command: sh -c "npm ci && npm run dev"
    networks:
      - app-network

volumes:
  backend_bundle_dev:
    driver: local
  backend_node_modules_dev:
    driver: local
  frontend_node_modules_dev:
    driver: local
  frontend_next_dev:
    driver: local
  postgres_data_dev:

networks:
  app-network:
    driver: bridge
  postgres-shared-net:
    driver: bridge
